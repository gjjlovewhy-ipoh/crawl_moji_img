name: ImageCrawl
on:
  workflow_dispatch:
  schedule:
    cron: '0 8 * * *'

jobs:
  run:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.10"

      - name: Install dep
        run: |
          pip config set index-url https://pypi.tuna.tsinghua.edu.cn/simple
          pip install requests beautifulsoup4

      - name: Run crawl
        run: python crawl.py

      - name: Save file
        run: |
          git config user.name bot
          git config user.email bot@qq.com
          git add image_links.json
          git commit -m "update images" || true
          git push
